<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
}

/* Floating Balloons */
.balloon{
position:absolute;
bottom:-120px;
font-size:50px;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* Envelope */
.envelope{
width:220px;
height:150px;
background:#ff6b81;
position:relative;
cursor:pointer;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
transition:.6s;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:75px solid #ff8fa3;
transform-origin:top;
transition:1s;
}

.envelope.open:before{
transform:rotateX(180deg);
}

/* Card */
.card{
position:absolute;
width:360px;
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.3);
display:none;
animation:pop .8s ease;
}

@keyframes pop{
0%{transform:scale(.2);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.card img{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:5px solid hotpink;
margin-bottom:15px;
}

.card h1{
color:#ff4081;
margin-bottom:10px;
}

.card p{
font-size:18px;
color:#444;
min-height:90px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
border:none;
background:#ff4081;
color:white;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#e91e63;
transform:scale(1.05);
}

/* Hearts */
.heart{
position:absolute;
color:red;
font-size:20px;
animation:hearts 5s linear forwards;
}

@keyframes hearts{
0%{
transform:translateY(0) scale(.5);
opacity:1;
}
100%{
transform:translateY(-100vh) scale(2);
opacity:0;
}
}

/* Confetti */
.confetti{
position:absolute;
font-size:22px;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-20px) rotate(0);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}
</style>

</head>

<body>

<div id="container">

<div class="envelope" id="envelope"></div>

<div class="card" id="card">

<!-- Replace birthday.jpg with your own picture -->
<img src="birthday.jpg" alt="Birthday">

<h1>🎂 Happy Birthday! 🎉</h1>

<p id="typing"></p>

<button onclick="celebrate()">Celebrate 🎁</button>

</div>

</div>

<!-- Optional music -->
<audio id="music" loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

// Balloons
for(let i=0;i<15;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML=["🎈","🎉","✨"][Math.floor(Math.random()*3)];
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(6+Math.random()*6)+"s";
b.style.fontSize=(35+Math.random()*35)+"px";
document.body.appendChild(b);
}

const envelope=document.getElementById("envelope");
const card=document.getElementById("card");
const music=document.getElementById("music");

envelope.onclick=function(){

envelope.classList.add("open");

setTimeout(()=>{

envelope.style.display="none";
card.style.display="block";

music.play().catch(()=>{});

typeText();

},900);

}

function typeText(){

let text="At twenty-four, you shine so bright,
A gorgeous woman, full of light.
Smart and strong in all you do,
Independent, confident and true.

You chase your dreams with fearless grace,
Meeting every challenge face to face.
With strength and wisdom by your side,
You walk through life with endless pride.

You love to travel, laugh and roam,
Turning every place into a home.
And yes, you love to spend a little too,
But life’s adventures are worth it to you.

May this year bring joy, success, and more
Than any year you’ve known before.
Keep being the woman I adore.
Happy Birthday and cheers to twenty-four!";

let i=0;

let speed=45;

let typing=document.getElementById("typing");

let timer=setInterval(function(){

typing.innerHTML+=text.charAt(i);

i++;

if(i>=text.length)
clearInterval(timer);

},speed);

}

function celebrate(){

// Confetti
for(let i=0;i<150;i++){

let c=document.createElement("div");

c.className="confetti";

c.innerHTML=["🎉","🎊","✨","🎈"][Math.floor(Math.random()*4)];

c.style.left=Math.random()*100+"vw";

c.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

// Hearts
for(let i=0;i<60;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.bottom="0";

document.body.appendChild(h);

setTimeout(()=>h.remove(),5000);

}

alert("🎂 Happy Birthday! Have an amazing day filled with joy and love! ❤️");

}

</script>

</body>
</html>
